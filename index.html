<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبة أفلام راوية | RAOUIA Movies</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <style>
        /* المتغيرات الأساسية (CSS Variables) */
        :root {
            --primary-color: #e50914;
            --bg-color: #0f0f0f;
            --card-bg: #1e1e1e;
            --text-color: #ffffff;
            --transition-speed: 0.3s;
        }

        body { 
            font-family: 'Cairo', sans-serif; 
            background: var(--bg-color); 
            color: var(--text-color); 
            margin: 0; 
            padding: 0; 
            overflow-x: hidden;
        }

        /* شريط التنقل (Navbar) */
        header {
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        header h1 {
            margin: 0;
            color: var(--primary-color);
            font-size: 28px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* قسم المشغل (Video Player Section) */
        .player-container { 
            max-width: 900px; 
            margin: 40px auto; 
            padding: 0 20px;
            text-align: center; 
        }

        .video-wrapper {
            position: relative;
            padding-top: 56.25%; /* نسبة العرض إلى الارتفاع 16:9 (Aspect Ratio) */
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(229, 9, 20, 0.1);
            border: 1px solid #333;
        }

        video { 
            position: absolute;
            top: 0;
            left: 0;
            width: 100%; 
            height: 100%;
        }

        #nowPlaying { 
            margin-top: 15px; 
            color: #ccc; 
            font-size: 20px; 
            font-weight: bold;
        }

        /* نظام الشبكة للأفلام (Grid System) */
        .movies-grid {
            display: grid;
            /* تصميم متجاوب: تصغير وتكبير الكروت تلقائياً بناءً على حجم الشاشة */
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); 
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto 50px auto;
            padding: 0 20px;
        }

        /* تصميم كارت الفيلم (Movie Card) */
        .movie-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform var(--transition-speed), box-shadow var(--transition-speed);
            position: relative;
        }
        
        .movie-card:hover { 
            transform: translateY(-8px); 
            box-shadow: 0 8px 20px rgba(229, 9, 20, 0.3);
        }

        /* حاوية صورة الفيلم لتأثيرات الـ Hover */
        .image-container {
            position: relative;
            width: 100%;
            height: 300px;
        }

        .movie-card img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            transition: opacity var(--transition-speed);
        }

        /* أيقونة التشغيل عند تمرير الماوس (Play Icon Overlay) */
        .play-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity var(--transition-speed);
        }

        .movie-card:hover .play-overlay {
            opacity: 1;
        }

        .play-overlay svg {
            width: 50px;
            height: 50px;
            fill: var(--primary-color);
        }

        .movie-card h3 { 
            padding: 15px 10px; 
            font-size: 15px; 
            margin: 0; 
            text-align: center; 
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis; /* إضافة نقاط إذا كان العنوان طويلاً */
        }

        /* الفوتر (Footer) */
        footer {
            text-align: center;
            padding: 20px;
            background: #000;
            color: #555;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Disney for RAOUIA</h1>
    </header>

    <main>
        <section class="player-container">
            <div class="video-wrapper">
                <video id="mainVideo" controls></video>
            </div>
            <div id="nowPlaying">اختر فيلماً للمشاهدة لتستمتع بوقتك</div>
        </section>

        <section class="movies-grid" id="moviesContainer">
            </section>
    </main>

    <footer>
        تم التصميم بحب لمكتبة أفلام راوية &copy; 2026
    </footer>

    <script>
        // 1. مصفوفة البيانات (Data Array): ضع كل أفلامك هنا لتنظيم الكود
        const moviesData = [
            {
                title: "فيلم Frozen",
                image: "1.jpg",
                url: "https://egyy34dffdvwerwe432vxcvxcvbcx321scvxv45cdsw1dfdsfsd.visitmycityfor365days.online/hls2/01/00087/55mcxx34bn9g_n/index-v1-a1.m3u8?t=UPLDVeiEePj3woIYI8V0zHPpQOGK5sYK1E-nQeZCpII&s=1774341689&e=43200&f=439553&i=0.0&sp=0"
            },
            {
                title: "فيلم Smurfs 3 The Lost Village 2017",
                image: "2.jpg",
                url: "https://egyy39nnndffdvwerwe432vxcvxcvbcx321scvxv45cdsw1dfdsfsd.visitmycityfor365days.online/hls2/02/00088/wzpxx65kct26_h/index-v1-a1.m3u8?t=9DqKO83mghqxsCezKFuBEnRbCFxDjYlaFSJqB5gQPs0&s=1774342468&e=43200&f=443881&i=0.0&sp=0"
            },
            {
                title: "فيلم How to Train Your Dragon 1 2010",
                image: "3.jpg",
                url: "https://egy46dffdvwerwe432vxcvxcvbcx321scvxv45cdsw1dfdsfsd.visitmycityfor365days.online/hls2/02/00113/q0q2tgeordcf_h/index-v1-a1.m3u8?t=KQNoHAEOdO8T6Mf4PomMH7p_zmfX1odhUwuyHfYZiOk&s=1774342506&e=43200&f=568419&i=0.0&sp=0"
            },
            {
                title: "Tangled 2010",
                image: "4.jpg",
                url: "https://egyy33dffdvwerwe432vxcvxcvbcx321scvxv45cdsw1dfdsfsd.visitmycityfor365days.online/hls2/02/00091/oubf7foauuz7_h/index-v1-a1.m3u8?t=6xvV4eV9zrz7sIMweszbFVMJ2TwoBq7GVBe2WTXoLF8&s=1774349504&e=43200&f=560945&i=0.0&sp=0"
            },
            {
                title: "فيلم Ice Age 5 Collision Course 2016",
                image: "5.jpg",
                url: "https://eg45g2dffdvwerwe432vxcvxcvbcx321scvxv45cdsw1dfdsfsd.visitmycityfor365days.online/hls2/02/00087/zh2rm4ehwf97_h/index-v1-a1.m3u8?t=DV4oZi-PyOJr0MlJ6hTpouNOAwhFbKk96xMf6QdSuU4&s=1774349748&e=43200&f=439408&i=0.0&sp=0"
            }
            // يمكنك إضافة باقي الأفلام هنا بنفس الطريقة تماماً (نسخ ولصق الكتلة السابقة وتغيير الرابط والصورة)
        ];

        // المتغيرات الأساسية للمشغل
        const videoElement = document.getElementById('mainVideo');
        const nowPlayingText = document.getElementById('nowPlaying');
        const moviesContainer = document.getElementById('moviesContainer');
        let hlsPlayer = new Hls();

        // 2. دالة توليد عناصر الأفلام في الصفحة (DOM Generation)
        function renderMovies() {
            moviesData.forEach(movie => {
                // إنشاء كارت الفيلم
                const card = document.createElement('div');
                card.className = 'movie-card';
                // عند الضغط على الكارت نقوم بتشغيل الفيلم
                card.onclick = () => playMovie(movie.url, movie.title);

                // أيقونة التشغيل (SVG Play Icon)
                const playIcon = `<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>`;

                card.innerHTML = `
                    <div class="image-container">
                        <img src="${movie.image}" alt="${movie.title}" loading="lazy">
                        <div class="play-overlay">${playIcon}</div>
                    </div>
                    <h3 title="${movie.title}">${movie.title}</h3>
                `;
                
                moviesContainer.appendChild(card);
            });
        }

        // 3. دالة تشغيل الفيلم (Playback Function)
        function playMovie(url, title) {
            nowPlayingText.innerText = "أنت تشاهد الآن: " + title;
            
            // تمرير الشاشة للأعلى بنعومة (Smooth Scroll)
            window.scrollTo({ top: 0, behavior: 'smooth' });

            // التحقق من دعم المتصفح لمكتبة HLS
            if (Hls.isSupported()) {
                hlsPlayer.destroy(); // تنظيف الذاكرة من الفيلم السابق
                hlsPlayer = new Hls();
                hlsPlayer.loadSource(url);
                hlsPlayer.attachMedia(videoElement);
                hlsPlayer.on(Hls.Events.MANIFEST_PARSED, function() {
                    videoElement.play();
                });
            } 
            // دعم أجهزة آبل (iOS/Safari) التي تدعم الصيغة مباشرة (Native Support)
            else if (videoElement.canPlayType('application/vnd.apple.mpegurl')) {
                videoElement.src = url;
                videoElement.play();
            }
        }

        // تشغيل دالة توليد الأفلام عند تحميل الصفحة
        renderMovies();

    </script>
</body>
</html>
