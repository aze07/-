<head>
    <meta charset="UTF-8">

    <title>مكتبة أفلام راوية | RAOUIA Movies</title>

    <style>
        :root {
            --primary-color: #e50914; 
            --bg-color: #0f0f0f;
            --card-bg: #1e1e1e;
            --text-color: #ffffff;
            --transition-speed: 0.3s;
        }

        body { 
            font-family: 'Cairo', sans-serif; 
            background: var(--bg-color); 
            color: var(--text-color); 
            margin: 0; 
            padding: 0; 
            overflow-x: hidden;
        }

        header {
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        header h1 {
            margin: 0;
            color: var(--primary-color);
            font-size: 28px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .player-container { 
            max-width: 900px; 
            margin: 40px auto; 
            padding: 0 20px;
            text-align: center; 
        }

        .video-wrapper {
            position: relative;
            padding-top: 56.25%; 
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(229, 9, 20, 0.1);
            border: 1px solid #333;
        }

        video { 
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }
        
        video::-webkit-media-controls {
            display:none !important;
        }

        /* حاوية عناصر التحكم السفلية */
        .custom-controls {
            position: absolute;
            bottom: 0; left: 0;
            width: 100%;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            padding: 10px 15px;
            box-sizing: border-box;
            opacity: 1;
            transition: opacity 0.3s;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .progress-area {
            height: 5px; 
            width: 100%;
            background: rgba(255,255,255,0.2); 
            cursor: pointer;
            position: relative;
            border-radius: 2px;
            transition: height 0.1s;
        }

        .progress-area:hover { height: 8px; }

        .buffer-bar-integrated {
            height: 100%;
            background-color: rgba(255, 255, 255, 0.4); 
            width: 0%; 
            position: absolute;
            left: 0; top: 0;
            border-radius: 2px;
        }

        .current-time-bar {
            height: 100%;
            background-color: var(--primary-color); 
            width: 0%; 
            position: absolute;
            left: 0; top: 0;
            border-radius: 2px;
            z-index: 2; 
        }

        .scrubber-dot {
            height: 13px; width: 13px;
            background-color: var(--primary-color);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            transform: translate(-50%, -50%);
            left: 0%; 
            z-index: 3;
            opacity: 0; 
            transition: opacity 0.2s;
        }

        .progress-area:hover .scrubber-dot { opacity: 1; }

        /* صف الأزرار (Buttons Row) */
        .controls-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .left-controls, .right-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .control-btn {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.8;
            transition: opacity 0.2s, color 0.2s;
        }

        .control-btn:hover {
            opacity: 1;
            color: var(--primary-color);
        }

        .control-btn svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        .time-display {
            color: #ddd;
            font-size: 13px;
            font-family: monospace;
            direction: ltr; /* لضمان ظهور الوقت بشكل صحيح */
        }

        #nowPlaying { 
            margin-top: 15px; 
            color: #ccc; 
            font-size: 20px; 
            font-weight: bold;
        }

        .search-container {
            max-width: 600px;
            margin: 0 auto 30px auto;
            padding: 0 20px;
            text-align: center;
        }

        #searchInput {
            width: 100%;
            padding: 12px 20px;
            font-family: 'Cairo', sans-serif;
            font-size: 16px;
            border-radius: 25px;
            border: 2px solid #333;
            background: var(--card-bg);
            color: var(--text-color);
            outline: none;
            transition: border-color var(--transition-speed);
        }

        #searchInput:focus { border-color: var(--primary-color); }

        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); 
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto 50px auto;
            padding: 0 20px;
        }

        .movie-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform var(--transition-speed), box-shadow var(--transition-speed);
            position: relative;
        }
        
        .movie-card:hover { 
            transform: translateY(-8px); 
            box-shadow: 0 8px 20px rgba(229, 9, 20, 0.3);
        }

        .image-container {
            position: relative;
            width: 100%; height: 300px;
        }

        .movie-card img { 
            width: 100%; height: 100%; 
            object-fit: cover; 
            transition: opacity var(--transition-speed);
        }

        .play-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity var(--transition-speed);
        }

        .movie-card:hover .play-overlay { opacity: 1; }

        .play-overlay svg {
            width: 50px; height: 50px;
            fill: var(--primary-color);
        }

        .movie-card h3 { 
            padding: 15px 10px; 
            font-size: 15px; margin: 0; 
            text-align: center; 
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; 
        }

        footer {
            text-align: center;
            padding: 20px; background: #000;
            color: #555; font-size: 14px;
        }
    </style>
</head>

            const minutes = Math.floor(timeInSeconds / 60);
            const seconds = Math.floor(timeInSeconds % 60);
            return `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
        }

        // 4. دالة توليد عناصر الأفلام في الصفحة (DOM Generation)
        function renderMovies(moviesList = moviesData) {
            moviesContainer.innerHTML = ''; 
            
            if (moviesList.length === 0) {
                moviesContainer.innerHTML = '<p style="text-align: center; width: 100%; color: #ccc;">عذراً، لم يتم العثور على أفلام مطابقة لبحثك.</p>';
                return;
            }

            moviesList.forEach(movie => {
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.onclick = () => playMovie(movie.url, movie.title);

                const cardPlayIcon = `<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>`;

                card.innerHTML = `
                    <div class="image-container">
                        <img src="${movie.image}" alt="${movie.title}" loading="lazy">
                        <div class="play-overlay">${cardPlayIcon}</div>
                    </div>
                    <h3 title="${movie.title}">${movie.title}</h3>
                `;
                
                moviesContainer.appendChild(card);
            });
        }

        // 5. دالة تشغيل الفيلم (Playback Function)
        function playMovie(url, title) {
            nowPlayingText.innerText = "أنت تشاهد الآن: " + title;
            window.scrollTo({ top: 0, behavior: 'smooth' });

            bufferBarIntegrated.style.width = '0%';
            currentTimeBar.style.width = '0%';
            scrubberDot.style.left = '0%';
            currentTimeDisplay.innerText = "0:00";

            if (Hls.isSupported()) {
                hlsPlayer.destroy(); 
                hlsPlayer = new Hls();
                hlsPlayer.loadSource(url);
                hlsPlayer.attachMedia(videoElement);
                hlsPlayer.on(Hls.Events.MANIFEST_PARSED, function() {
                    videoElement.play();
                });
            } 
            else if (videoElement.canPlayType('application/vnd.apple.mpegurl')) {
                videoElement.src = url;
                videoElement.play();
            }
        }

        // 6. نظام البحث (Search Functionality)
        searchInput.addEventListener('input', (event) => {
            const searchTerm = event.target.value.toLowerCase().trim();
            const filteredMovies = moviesData.filter(movie => 
                movie.title.toLowerCase().includes(searchTerm)
            );
            renderMovies(filteredMovies);
        });

        // 7. منطق أزرار التحكم المخصصة (Custom Controls Logic)

        // تشغيل / إيقاف
        function togglePlay() {
            if (videoElement.paused) {
                videoElement.play();
            } else {
                videoElement.pause();
            }
        }

        playPauseBtn.addEventListener('click', togglePlay);
        videoElement.addEventListener('click', togglePlay);

        // تحديث أيقونة التشغيل/الإيقاف
        videoElement.addEventListener('play', () => {
            playIcon.style.display = 'none';
            pauseIcon.style.display = 'block';
        });
        videoElement.addEventListener('pause', () => {
            playIcon.style.display = 'block';
            pauseIcon.style.display = 'none';
        });

        // كتم الصوت
        muteBtn.addEventListener('click', () => {
            videoElement.muted = !videoElement.muted;
            if(videoElement.muted) {
                muteBtn.style.color = 'var(--primary-color)';
            } else {
                muteBtn.style.color = 'white';
            }
        });

        // ملء الشاشة (Fullscreen)
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                videoWrapper.requestFullscreen().catch(err => {
                    alert(`خطأ في تشغيل وضع ملء الشاشة: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        });

        // تحديث الوقت والمدة
        videoElement.addEventListener('loadedmetadata', () => {
            durationDisplay.innerText = formatTime(videoElement.duration);
        });

        videoElement.addEventListener('timeupdate', () => {
            const currentTime = videoElement.currentTime;
            const duration = videoElement.duration;
            currentTimeDisplay.innerText = formatTime(currentTime);

            if (duration > 0) {
                const percentage = (currentTime / duration) * 100;
                currentTimeBar.style.width = `${percentage}%`;
                scrubberDot.style.left = `${percentage}%`;
            }
        });

        // تحديث التحميل المسبق المدمج (Buffer)
        videoElement.addEventListener('progress', () => {
            if (videoElement.buffered.length > 0) {
                const duration = videoElement.duration;
                const bufferedEnd = videoElement.buffered.end(videoElement.buffered.length - 1);
                
                if (duration > 0) {
                    const percentage = (bufferedEnd / duration) * 100;
                    bufferBarIntegrated.style.width = `${percentage}%`;
                }
            }
        });

        // التقديم والترجيع عبر النقر (Seeking)
        progressArea.addEventListener('click', (e) => {
            const areaWidth = progressArea.clientWidth;
            const clickX = e.offsetX;
            const duration = videoElement.duration;
            videoElement.currentTime = (clickX / areaWidth) * duration;
        });

        // إخفاء الواجهة عند عدم الحركة (Hide Controls on Idle)
        let controlsTimeout;
        videoWrapper.addEventListener('mousemove', () => {
            customControls.style.opacity = '1';
            videoWrapper.style.cursor = 'default';
            clearTimeout(controlsTimeout);
            controlsTimeout = setTimeout(() => {
                if (!videoElement.paused) {
                    customControls.style.opacity = '0';
                    videoWrapper.style.cursor = 'none';
                }
            }, 3000); 
        });

        videoWrapper.addEventListener('mouseleave', () => {
            if (!videoElement.paused) {
                customControls.style.opacity = '0';
            }
        });

        // التشغيل الأولي
        renderMovies();

    </script>
</body>
</html>
