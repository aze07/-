<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبة أفلام راوية</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f0f0f; color: white; margin: 0; padding: 20px; }
        h1 { text-align: center; color: #e50914; }
        
        /* قسم المشغل في الأعلى */
        .player-section { max-width: 800px; margin: 0 auto 30px; text-align: center; }
        video { width: 100%; border: 2px solid #333; border-radius: 12px; background: black; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #nowPlaying { margin-top: 10px; color: #aaa; font-size: 18px; }

        /* نظام الشبكة للأفلام (Grid System) */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr); 
            gap: 20px;
            max-width: 1000px;
            margin: auto;
        }

        .movie-card {
            background: #1e1e1e;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid #333;
        }
        .movie-card:hover { transform: translateY(-5px); border-color: #e50914; }
        .movie-card img { width: 100%; height: 250px; object-fit: cover; }
        .movie-card h3 { padding: 10px; font-size: 14px; margin: 0; text-align: center; }

        /* التصميم المتجاوب (Responsive Design) */
        /* للتابلت: 3 أفلام في السطر */
        @media (max-width: 900px) {
            .grid-container {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        /* للهواتف: فيلمان في السطر */
        @media (max-width: 600px) {
            .grid-container {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }
            .movie-card img {
                height: 200px; /* تصغير الصورة قليلاً لتناسب الشاشة */
            }
        }
    </style>
</head>
<body>

    <h1>Disney for RAOUIA</h1>

    <div class="player-section">
        <video id="mainVideo" controls></video>
        <div id="nowPlaying">اختر فيلماً للمشاهدة</div>
    </div>

    <div class="grid-container">
        
        <div class="movie-card" onclick="playMovie('https://egyy34dffdvwerwe432vxcvxcvbcx321scvxv45cdsw1dfdsfsd.visitmycityfor365days.online/hls2/01/00087/55mcxx34bn9g_n/index-v1-a1.m3u8?t=UPLDVeiEePj3woIYI8V0zHPpQOGK5sYK1E-nQeZCpII&s=1774341689&e=43200&f=439553&i=0.0&sp=0', 'فيلم Frozen')">
            <img src="https://image.tmdb.org/t/p/w500/kgwjIb2JVLEEdONk6Y5CjY1G0nK.jpg" loading="lazy" alt="Frozen">
            <h3>فيلم Frozen</h3>
        </div>

        <div class="movie-card" onclick="playMovie('https://egyy39nnndffdvwerwe432vxcvxcvbcx321scvxv45cdsw1dfdsfsd.visitmycityfor365days.online/hls2/02/00088/wzpxx65kct26_h/index-v1-a1.m3u8?t=9DqKO83mghqxsCezKFuBEnRbCFxDjYlaFSJqB5gQPs0&s=1774342468&e=43200&f=443881&i=0.0&sp=0', 'فيلم Smurfs 3 The Lost Village 2017')">
            <img src="https://image.tmdb.org/t/p/w500/qA5kPYZA7FkVvqcEfJRoOy4kpHg.jpg" loading="lazy" alt="Smurfs 3">
            <h3>فيلم Smurfs 3</h3>
        </div>

        </div>

    <script>
        function playMovie(url, title) {
            const video = document.getElementById('mainVideo');
            const nowPlaying = document.getElementById('nowPlaying');

            // إعدادات مخصصة لتسريع hls.js (Configuration)
            const hlsConfig = {
                enableWorker: true,
                lowLatencyMode: true,
                maxBufferLength: 30,
            };

            if (Hls.isSupported()) {
                const hls = new Hls(hlsConfig);
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play();
                });
            } 
            // دعم متصفح Safari الذي يدعم HLS بشكل افتراضي
            else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.addEventListener('loadedmetadata', function() {
                    video.play();
                });
            }

            // تحديث النص والنزول السلس للمشغل (Smooth Scroll)
            nowPlaying.innerText = "يعرض الآن: " + title;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
